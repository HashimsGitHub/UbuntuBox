# UbuntuBox neofetch config
image_backend="chafa"
image_source="/etc/ubuntubox/ubuntubox-logo.png"
image_loop="off"
image_size="280px"
gap=4
chafa_ctab_mode="256"

print_info() {
    # Force title colours directly — avoids container $HOSTNAME/$USER issues
    # \e[38;5;87m = bright cyan,  \e[38;5;75m = bright blue,  \e[0m = reset
    prin "\e[1;38;5;87mUbuntuBox\e[0m"
    prin "\e[1;38;5;75mDeveloped by Hashim Hilal\e[0m"
    info underline

    info "OS"       distro
    info "Kernel"   kernel
    info "Uptime"   uptime
    info "Packages" packages
    info "Shell"    shell
    info "CPU"      cpu
    info "Memory"   memory

    info cols
}

colors=(6 12 6 6 6 6)
bold="on"
underline_enabled="on"
underline_char="-"
separator=":"
title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="off"
uptime_shorthand="on"
memory_percent="on"
memory_unit="mib"
package_managers="on"
shell_path="off"
shell_version="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"
term_font="off"
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"
